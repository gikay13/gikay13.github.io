
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ты не спишешь - Академическая честность</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030303;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden; /* Важно для параллакса */
        }

        /* Контейнер для параллакс-фона */
        #parallax-container {
            position: fixed;
            top: -5%;
            left: -5%;
            width: 110%; /* Делаем чуть больше экрана, чтобы было место для сдвига */
            height: 110%;
            z-index: -3;
        }

        /* Сам фон (Ваша фотография) */
        #bg-image {
            width: 100%;
            height: 100%;
            background-image: url('IMG_2643.jpeg'); /* Обновленное название вашей картинки */
            background-size: cover;
            background-position: center; /* Центрирование картинки */
            background-repeat: no-repeat;
            opacity: 0;
            filter: blur(10px);
            transition: transform 0.1s ease-out; /* Плавность следования за мышью */
            animation: bgAppear 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            will-change: transform;
        }

        /* Виньетки для читаемости текста */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 15%, rgba(3,3,3,0.85) 100%);
            z-index: -2;
            pointer-events: none;
        }
        
        @media (min-width: 768px) {
            .bg-overlay-linear {
                position: fixed;
                inset: 0;
                background: linear-gradient(90deg, rgba(3,3,3,0.95) 0%, rgba(3,3,3,0) 30%, rgba(3,3,3,0) 70%, rgba(3,3,3,0.95) 100%);
                z-index: -1;
                pointer-events: none;
            }
        }
        @media (max-width: 767px) {
            .bg-overlay-linear {
                position: fixed;
                inset: 0;
                background: linear-gradient(180deg, rgba(3,3,3,0.95) 0%, rgba(3,3,3,0) 25%, rgba(3,3,3,0) 65%, rgba(3,3,3,0.95) 100%);
                z-index: -1;
                pointer-events: none;
            }
        }

        /* Снег */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        /* UI Элементы */
        .neon-text {
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.4);
        }

        .neon-button {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(255,255,255,0.1), inset 0 0 10px rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        .neon-button:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 20px rgba(255,255,255,0.8), 0 0 40px rgba(255,255,255,0.5);
            border-color: #ffffff;
        }

        /* Анимации появления */
        @keyframes bgAppear {
            100% { opacity: 1; filter: blur(0); }
        }
        @keyframes slideInRight {
            0% { opacity: 0; transform: translateX(50px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInLeft {
            0% { opacity: 0; transform: translateX(-50px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .animate-text { opacity: 0; animation: slideInRight 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s; }
        .animate-btn { opacity: 0; animation: slideInLeft 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.8s; }

        /* Уведомление */
        #toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 15px 30px;
            border-radius: 30px;
            transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body class="antialiased selection:bg-white selection:text-black">

    <!-- 3D Параллакс Фон -->
    <div id="parallax-container">
        <div id="bg-image"></div>
    </div>
    
    <div class="bg-overlay"></div>
    <div class="bg-overlay-linear"></div>
    <canvas id="snow-canvas"></canvas>

    <!-- Контент -->
    <main class="relative z-10 w-full h-full flex flex-col md:flex-row justify-between items-center p-6 pb-12 md:p-20 lg:p-32 box-border pointer-events-none">
        
        <!-- ТЕКСТ (Справа на ПК, Сверху на мобильных) -->
        <div class="w-full md:w-1/3 order-1 md:order-3 flex justify-center md:justify-end text-center md:text-right mt-4 md:mt-0 animate-text pointer-events-auto">
            <div class="max-w-md">
                <h1 class="text-5xl md:text-6xl lg:text-7xl font-black uppercase tracking-tighter mb-4 md:mb-6 neon-text leading-none">
                    Ты не<br>спишешь
                </h1>
                <div class="w-16 h-1 bg-white mb-4 md:mb-6 opacity-70 mx-auto md:mx-0 md:ml-auto shadow-[0_0_15px_#fff]"></div>
                <p class="text-gray-200 text-sm md:text-base leading-relaxed font-light tracking-wide drop-shadow-md">
                    Списывая, ты лишаешь себя главного — развития. Истинные знания добываются только через ошибки и собственный труд. 
                    Чужой ответ не сделает тебя умнее, он лишь создаст иллюзию успеха. <br><br>
                    <span class="font-bold text-white">Выбирай сложный путь, выбирай честность.</span>
                </p>
            </div>
        </div>

        <!-- Центральная пустота для картинки -->
        <div class="order-2 md:order-2 flex-grow w-full md:w-1/3 min-h-[35vh] md:min-h-0"></div>

        <!-- КНОПКА СКАЧИВАНИЯ (Слева на ПК, Снизу на мобильных) -->
        <div class="w-full md:w-1/3 order-3 md:order-1 flex justify-center md:justify-start mb-4 md:mb-0 animate-btn pointer-events-auto">
            <a id="download-btn" href="Буравцов.pdf" download="Буравцов.pdf" class="neon-button px-8 py-4 sm:px-10 sm:py-5 rounded-full text-sm md:text-base font-bold flex items-center gap-3 group cursor-pointer w-full sm:w-auto justify-center uppercase tracking-widest text-white decoration-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-hover:-translate-y-1">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Скачать материал
            </a>
        </div>

    </main>

    <div id="toast" class="text-white text-sm tracking-wide shadow-[0_0_15px_rgba(255,255,255,0.2)]"></div>

    <script>
        // --- 1. ЭФФЕКТ 3D ПАРАЛЛАКСА ДЛЯ ФОНА ---
        const bgImage = document.getElementById('bg-image');
        
        // Для компьютеров (движение мыши)
        window.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25; // Коэффициент сдвига
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            bgImage.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
        });

        // Для телефонов (гироскоп/наклон)
        window.addEventListener('deviceorientation', (e) => {
            // Ограничиваем углы, чтобы картинка не улетала далеко
            const beta = Math.min(Math.max(e.beta || 0, -30), 30); // Наклон вперед-назад
            const gamma = Math.min(Math.max(e.gamma || 0, -30), 30); // Наклон влево-вправо
            
            const xAxis = gamma * 1.5; 
            const yAxis = (beta - 30) * 1.5; // Смещение центра тяжести

            bgImage.style.transform = `translate(${-xAxis}px, ${-yAxis}px)`;
        });

        // --- 2. СИСТЕМА НЕОНОВОГО СНЕГА ---
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Snowflake {
            constructor() { this.reset(); this.y = Math.random() * height; }
            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.6 + 0.2; 
                this.glow = Math.random() * 5 + 2;
            }
            update() {
                this.y += this.speedY; this.x += this.speedX;
                if (this.y > height + 10 || this.x > width || this.x < 0) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.shadowBlur = this.glow; ctx.shadowColor = 'rgba(255, 255, 255, 0.9)';
                ctx.fill(); ctx.closePath(); ctx.shadowBlur = 0;
            }
        }

        function createSnowflakes() {
            particles = [];
            const particleCount = Math.floor(width / (width > 768 ? 12 : 20)); 
            for (let i = 0; i < particleCount; i++) particles.push(new Snowflake());
        }

        function animateSnow() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateSnow);
        }

        window.addEventListener('resize', () => { initCanvas(); createSnowflakes(); });
        initCanvas(); createSnowflakes(); animateSnow();

        // --- 3. СКАЧИВАНИЕ И УВЕДОМЛЕНИЯ ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.getElementById('download-btn').addEventListener('click', () => {
            const btn = document.getElementById('download-btn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = 'Загрузка...';
            btn.style.pointerEvents = 'none';
            showToast("Скачивание презентации началось!");
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.style.pointerEvents = 'auto';
            }, 2000);
        });
    </script>
</body>
</html>
