
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ты не спишешь - Академическая честность</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js для мощной 3D графики -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GLTFLoader для загрузки вашей .glb модели -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030303;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Экран загрузки 3D модели */
        #loading-screen {
            position: fixed;
            inset: 0;
            background-color: #030303;
            z-index: 50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 3D Контейнер */
        #bg-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* ЗАПАСНОЙ ПЛАН: Контейнер для параллакс-фона (изначально скрыт) */
        #parallax-container {
            position: fixed;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            z-index: 0;
            display: none;
        }

        #bg-image {
            width: 100%;
            height: 100%;
            background-image: url('IMG_2643.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            filter: blur(10px);
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .fallback-appear {
            animation: bgAppear 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes bgAppear {
            100% { opacity: 1; filter: blur(0); }
        }


        /* Виньетки для читаемости текста */
        .bg-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 15%, rgba(3,3,3,0.9) 100%);
            z-index: 1;
            pointer-events: none;
        }
        
        @media (min-width: 768px) {
            .bg-overlay-linear {
                position: fixed;
                inset: 0;
                background: linear-gradient(90deg, rgba(3,3,3,0.95) 0%, rgba(3,3,3,0) 30%, rgba(3,3,3,0) 70%, rgba(3,3,3,0.95) 100%);
                z-index: 2;
                pointer-events: none;
            }
        }
        @media (max-width: 767px) {
            .bg-overlay-linear {
                position: fixed;
                inset: 0;
                background: linear-gradient(180deg, rgba(3,3,3,0.95) 0%, rgba(3,3,3,0) 25%, rgba(3,3,3,0) 65%, rgba(3,3,3,0.95) 100%);
                z-index: 2;
                pointer-events: none;
            }
        }

        /* 2D Снег */
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 3;
        }

        main { z-index: 10; }

        /* UI Элементы */
        .neon-text {
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.4);
        }

        .neon-button {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255,255,255,0.1), inset 0 0 10px rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        .neon-button:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 20px rgba(255,255,255,0.9), 0 0 40px rgba(255,255,255,0.6);
            border-color: #ffffff;
            transform: translateY(-2px);
        }

        /* Анимации UI */
        @keyframes slideInRight {
            0% { opacity: 0; transform: translateX(50px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInLeft {
            0% { opacity: 0; transform: translateX(-50px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .animate-text { opacity: 0; animation: slideInRight 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.5s; }
        .animate-btn { opacity: 0; animation: slideInLeft 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.8s; }

        #toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 15px 30px;
            border-radius: 30px;
            transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body class="antialiased selection:bg-white selection:text-black">

    <!-- Экран загрузки -->
    <div id="loading-screen">
        <div class="spinner mb-6"></div>
        <p class="text-white text-sm tracking-widest uppercase font-light animate-pulse">Загрузка 3D модели...</p>
    </div>

    <!-- 3D Сцена -->
    <div id="bg-3d"></div>
    
    <!-- Запасной план (параллакс) -->
    <div id="parallax-container">
        <div id="bg-image"></div>
    </div>

    <div class="bg-overlay"></div>
    <div class="bg-overlay-linear"></div>
    
    <!-- 2D Снег -->
    <canvas id="snow-canvas"></canvas>

    <!-- Основной Контент -->
    <main class="relative w-full h-full flex flex-col md:flex-row justify-between items-center p-6 pb-12 md:p-20 lg:p-32 box-border pointer-events-none" id="main-content" style="opacity: 0; transition: opacity 1s ease;">
        
        <!-- ТЕКСТ (Справа) -->
        <div class="w-full md:w-1/3 order-1 md:order-3 flex justify-center md:justify-end text-center md:text-right mt-4 md:mt-0 animate-text pointer-events-auto">
            <div class="max-w-md bg-black bg-opacity-30 p-6 rounded-3xl backdrop-blur-sm border border-white border-opacity-10">
                <h1 class="text-5xl md:text-6xl lg:text-7xl font-black uppercase tracking-tighter mb-4 md:mb-6 neon-text leading-none">
                    Ты не<br>спишешь
                </h1>
                <div class="w-16 h-1 bg-white mb-4 md:mb-6 opacity-70 mx-auto md:mx-0 md:ml-auto shadow-[0_0_15px_#fff]"></div>
                <p class="text-gray-200 text-sm md:text-base leading-relaxed font-light tracking-wide drop-shadow-md">
                    Списывая, ты лишаешь себя главного — развития. Истинные знания добываются только через ошибки и собственный труд. 
                    Чужой ответ не сделает тебя умнее, он лишь создаст иллюзию успеха. <br><br>
                    <span class="font-bold text-white">Выбирай сложный путь, выбирай честность.</span>
                </p>
            </div>
        </div>

        <div class="order-2 md:order-2 flex-grow w-full md:w-1/3 min-h-[40vh] md:min-h-0 pointer-events-none"></div>

        <!-- КНОПКА (Слева) -->
        <div class="w-full md:w-1/3 order-3 md:order-1 flex justify-center md:justify-start mb-4 md:mb-0 animate-btn pointer-events-auto">
            <a id="download-btn" href="Буравцов.pdf" download="Буравцов.pdf" class="neon-button px-8 py-4 sm:px-10 sm:py-5 rounded-full text-sm md:text-base font-bold flex items-center gap-3 group cursor-pointer w-full sm:w-auto justify-center uppercase tracking-widest text-white decoration-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-hover:-translate-y-1">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Скачать материал
            </a>
        </div>

    </main>

    <div id="toast" class="text-white text-sm tracking-wide shadow-[0_0_15px_rgba(255,255,255,0.2)]"></div>

    <script>
        // ==========================================
        // 1. ЗАГРУЗКА И НАСТРОЙКА 3D-МОДЕЛЕЙ С КОРЕКТНЫМИ ПУТЯМИ
        // ==========================================
        let mouseX = 0;
        let mouseY = 0;

        window.onload = function() {
            const container = document.getElementById('bg-3d');
            const fallbackContainer = document.getElementById('parallax-container');
            const bgImage = document.getElementById('bg-image');
            const isMobile = window.innerWidth < 768;
            
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030303, 0.04);

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            // --- ОСВЕЩЕНИЕ ---
            const ambient = new THREE.AmbientLight(0xffffff, 0.6); 
            scene.add(ambient);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
            dirLight.position.set(5, 10, 10);
            scene.add(dirLight);
            
            const rimLight = new THREE.DirectionalLight(0xffffff, 4);
            rimLight.position.set(-5, 5, -10);
            scene.add(rimLight);

            const modelWrapper = new THREE.Group();
            scene.add(modelWrapper);

            // Менеджер загрузки текстур (он перехватывает пути к текстурам внутри .glb)
            // И заставляет их искаться в той же папке, где лежит index.html
            const manager = new THREE.LoadingManager();
            manager.setURLModifier((url) => {
                // Если модель пытается искать текстуры в папках "source/" или "textures/", убираем эти пути
                let filename = url.split('/').pop();
                return filename; 
            });

            // ЗАГРУЗКА .GLB ФАЙЛА (теперь без папок)
            const loader = new THREE.GLTFLoader(manager);
            loader.load(
                'neon white.glb', // Обращение к модели в корневой папке
                function (gltf) {
                    const model = gltf.scene;

                    // Принудительно делаем черно-белый глянцевый стиль
                    model.traverse((child) => {
                        if (child.isMesh) {
                            // Создаем новый материал
                            const newMat = new THREE.MeshPhysicalMaterial({
                                color: 0x050505, // Почти черный
                                metalness: 0.9,
                                roughness: 0.1,
                                clearcoat: 1.0,
                                clearcoatRoughness: 0.1
                            });
                            
                            child.material = newMat;
                            
                            // Добавляем белые неоновые контуры
                            const edges = new THREE.EdgesGeometry(child.geometry, 15);
                            const lines = new THREE.LineSegments(
                                edges, 
                                new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 })
                            );
                            child.add(lines);
                        }
                    });

                    // Центрирование и масштабирование
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    
                    const scale = 8 / maxDim; 
                    model.scale.setScalar(scale);
                    model.position.sub(center.multiplyScalar(scale)); 

                    modelWrapper.add(model);
                    modelWrapper.position.y = isMobile ? -1 : -0.5;
                    camera.position.z = isMobile ? 14 : 10; 

                    // Убираем загрузочный экран
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        container.style.opacity = '1';
                        document.getElementById('main-content').style.opacity = '1';
                    }, 1000);

                    // Анимация
                    const clock = new THREE.Clock();
                    function animate3D() {
                        requestAnimationFrame(animate3D);
                        const time = clock.getElapsedTime();

                        const baseY = isMobile ? -1 : -0.5;
                        modelWrapper.position.y = baseY + Math.sin(time * 2) * 0.15;

                        modelWrapper.rotation.y += (mouseX * 0.5 - modelWrapper.rotation.y) * 0.05;
                        modelWrapper.rotation.x += (-mouseY * 0.2 - modelWrapper.rotation.x) * 0.05;

                        renderer.render(scene, camera);
                    }
                    animate3D();
                },
                function (xhr) {
                    console.log((xhr.loaded / xhr.total * 100) + '% загружено');
                },
                function (error) {
                    // ЗАПАСНОЙ ПЛАН - ЕСЛИ МОДЕЛЬ НЕ НАЙДЕНА
                    console.warn("3D модель не найдена. Включаем фото-фон.");
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('main-content').style.opacity = '1';
                    }, 500);

                    container.style.display = 'none';
                    fallbackContainer.style.display = 'block';
                    bgImage.classList.add('fallback-appear');
                }
            );

            window.addEventListener('resize', () => {
                const newIsMobile = window.innerWidth < 768;
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                modelWrapper.position.y = newIsMobile ? -1 : -0.5;
                camera.position.z = newIsMobile ? 14 : 10; 
            });
        };

        // Интерактив для мыши и гироскопа (работает и для 3D и для запасного параллакса)
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;

            const bgImage = document.getElementById('bg-image');
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            bgImage.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
        });

        window.addEventListener('deviceorientation', (e) => {
            mouseX = Math.min(Math.max(e.gamma || 0, -30), 30) / 30;
            mouseY = -Math.min(Math.max((e.beta || 0) - 30, -30), 30) / 30;

            const bgImage = document.getElementById('bg-image');
            const xAxis = (e.gamma || 0) * 1.5; 
            const yAxis = ((e.beta || 0) - 30) * 1.5;
            bgImage.style.transform = `translate(${-xAxis}px, ${-yAxis}px)`;
        });

        // ==========================================
        // 2. 2D НЕОНОВЫЙ СНЕГ
        // ==========================================
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Snowflake {
            constructor() { this.reset(); this.y = Math.random() * height; }
            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.6 + 0.2; 
                this.glow = Math.random() * 5 + 2;
            }
            update() {
                this.y += this.speedY; this.x += this.speedX;
                if (this.y > height + 10 || this.x > width || this.x < 0) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.shadowBlur = this.glow; ctx.shadowColor = 'rgba(255, 255, 255, 0.9)';
                ctx.fill(); ctx.closePath(); ctx.shadowBlur = 0;
            }
        }

        function createSnowflakes() {
            particles = [];
            const particleCount = Math.floor(width / (width > 768 ? 12 : 20)); 
            for (let i = 0; i < particleCount; i++) particles.push(new Snowflake());
        }

        function animateSnow() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateSnow);
        }

        window.addEventListener('resize', () => { initCanvas(); createSnowflakes(); });
        initCanvas(); createSnowflakes(); animateSnow();

        // ==========================================
        // 3. СКАЧИВАНИЕ И УВЕДОМЛЕНИЯ
        // ==========================================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.getElementById('download-btn').addEventListener('click', () => {
            const btn = document.getElementById('download-btn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = 'ЗАГРУЗКА...';
            btn.style.pointerEvents = 'none';
            showToast("Скачивание презентации началось!");
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.style.pointerEvents = 'auto';
            }, 2000);
        });
    </script>
</body>
</html>
