
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ты не спишешь - Академическая честность</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #030303;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #bg-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -3;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, transparent 15%, rgba(3,3,3,0.9) 100%);
            z-index: -2;
            pointer-events: none;
        }
        
        @media (min-width: 768px) {
            .bg-overlay-linear {
                position: fixed;
                inset: 0;
                background: linear-gradient(90deg, rgba(3,3,3,0.95) 0%, rgba(3,3,3,0) 30%, rgba(3,3,3,0) 70%, rgba(3,3,3,0.95) 100%);
                z-index: -1;
                pointer-events: none;
            }
        }
        @media (max-width: 767px) {
            .bg-overlay-linear {
                position: fixed;
                inset: 0;
                /* На мобильных затемняем сильнее сверху и снизу, чтобы текст читался лучше */
                background: linear-gradient(180deg, rgba(3,3,3,0.95) 0%, rgba(3,3,3,0) 25%, rgba(3,3,3,0) 65%, rgba(3,3,3,0.95) 100%);
                z-index: -1;
                pointer-events: none;
            }
        }

        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        .neon-text {
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 255, 255, 0.4),
                0 0 30px rgba(255, 255, 255, 0.2);
        }

        .neon-button {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 0 15px rgba(255, 255, 255, 0.1),
                inset 0 0 10px rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: none;
        }

        .neon-button:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 
                0 0 20px rgba(255, 255, 255, 0.8),
                0 0 40px rgba(255, 255, 255, 0.5);
            border-color: #ffffff;
        }

        @keyframes slideInRight {
            0% { opacity: 0; transform: translateX(50px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInLeft {
            0% { opacity: 0; transform: translateX(-50px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .animate-text {
            opacity: 0;
            animation: slideInRight 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.5s;
        }
        .animate-btn {
            opacity: 0;
            animation: slideInLeft 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 1s;
        }

        #toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 15px 30px;
            border-radius: 30px;
            transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            text-align: center;
        }
        #toast.show { bottom: 40px; }
    </style>
</head>
<body class="antialiased selection:bg-white selection:text-black">

    <div id="bg-3d"></div>
    <div class="bg-overlay"></div>
    <div class="bg-overlay-linear"></div>
    <canvas id="snow-canvas"></canvas>

    <main class="relative z-10 w-full h-full flex flex-col md:flex-row justify-between items-center p-6 pb-12 md:p-20 lg:p-32 box-border">
        
        <div class="w-full md:w-1/3 order-1 md:order-3 flex justify-center md:justify-end text-center md:text-right mt-4 md:mt-0 animate-text pointer-events-auto">
            <div class="max-w-md">
                <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black uppercase tracking-tighter mb-4 md:mb-6 neon-text leading-none">
                    Ты не<br>спишешь
                </h1>
                <div class="w-16 h-1 bg-white mb-4 md:mb-6 opacity-70 mx-auto md:mx-0 md:ml-auto shadow-[0_0_15px_#fff]"></div>
                <p class="text-gray-200 text-xs sm:text-sm md:text-base leading-relaxed font-light tracking-wide drop-shadow-md">
                    Списывая, ты лишаешь себя главного — развития. Истинные знания добываются только через ошибки и собственный труд. 
                    Чужой ответ не сделает тебя умнее, он лишь создаст иллюзию успеха. <br><br>
                    <span class="font-bold text-white">Выбирай сложный путь, выбирай честность.</span>
                </p>
            </div>
        </div>

        <div class="order-2 md:order-2 flex-grow w-full md:w-1/3 min-h-[35vh] md:min-h-0 pointer-events-none"></div>

        <div class="w-full md:w-1/3 order-3 md:order-1 flex justify-center md:justify-start mb-4 md:mb-0 animate-btn pointer-events-auto">
            <a id="download-btn" href="Буравцов.pdf" download="Буравцов.pdf" class="neon-button px-8 py-4 sm:px-10 sm:py-5 rounded-full text-sm md:text-base font-bold flex items-center gap-3 group cursor-pointer w-full sm:w-auto justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-hover:-translate-y-1">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Скачать материал
            </a>
        </div>

    </main>

    <div id="toast" class="text-white text-sm tracking-wide shadow-[0_0_15px_rgba(255,255,255,0.2)]"></div>

    <script>
        // ==========================================
        // 1. НАСТРОЙКА 3D СЦЕНЫ (ОПТИМИЗАЦИЯ ДЛЯ МОБИЛОК)
        // ==========================================
        window.onload = function() {
            const container = document.getElementById('bg-3d');
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030303, 0.04);

            // Проверка на мобильное устройство
            const isMobile = window.innerWidth < 768;

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            
            // Если мобилка, отодвигаем камеру дальше, чтобы модель влезла в узкий экран
            camera.position.z = isMobile ? 15 : 10; 
            camera.position.y = 1;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Ограничиваем pixelRatio для лучшей производительности на старых телефонах
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            container.appendChild(renderer.domElement);

            // --- Материалы ---
            const matteBlack = new THREE.MeshStandardMaterial({ 
                color: 0x0a0a0a, 
                roughness: 0.8, 
                metalness: 0.1 
            });

            // Безопасный для мобилок прозрачный материал (вместо тяжелого стекла)
            const glassMaterial = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                metalness: 0.6,
                roughness: 0.1,
                opacity: 0.35, // Полупрозрачность работает везде
                transparent: true,
                clearcoat: 1.0,
                side: THREE.DoubleSide
            });

            // --- Геометрия ---
            const mannequinGroup = new THREE.Group();

            const headGeo = new THREE.SphereGeometry(1.2, 64, 64);
            const head = new THREE.Mesh(headGeo, matteBlack);
            head.position.y = 3;
            mannequinGroup.add(head);

            const neckGeo = new THREE.CylinderGeometry(0.4, 0.6, 1.5, 32);
            const neck = new THREE.Mesh(neckGeo, matteBlack);
            neck.position.y = 1.8;
            mannequinGroup.add(neck);

            const bodyGeo = new THREE.SphereGeometry(2.5, 64, 64);
            const body = new THREE.Mesh(bodyGeo, matteBlack);
            body.scale.set(1, 0.8, 0.5); 
            body.position.y = -0.5;
            mannequinGroup.add(body);

            const jacketGeo = new THREE.SphereGeometry(2.65, 64, 64);
            const jacket = new THREE.Mesh(jacketGeo, glassMaterial);
            jacket.scale.set(1.1, 0.9, 0.6);
            jacket.position.y = -0.6;
            
            const collarGeo = new THREE.CylinderGeometry(0.8, 1.1, 1.5, 32, 1, true);
            const collar = new THREE.Mesh(collarGeo, glassMaterial);
            collar.position.y = 1.6;
            collar.scale.set(1, 1, 0.8);
            jacket.add(collar);

            mannequinGroup.add(jacket);

            // Позиция: на мобильном поднимаем модель чуть выше, чтобы она была в центре
            mannequinGroup.position.y = isMobile ? 0 : -1;
            scene.add(mannequinGroup);

            // --- Освещение ---
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 2);
            mainLight.position.set(5, 10, 7);
            scene.add(mainLight);

            const rimLight = new THREE.DirectionalLight(0xffffff, 3);
            rimLight.position.set(-5, 5, -10);
            scene.add(rimLight);

            const pointLight1 = new THREE.PointLight(0xffffff, 1.5, 50);
            pointLight1.position.set(3, 2, 4);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0xddddff, 1.5, 50);
            pointLight2.position.set(-4, -1, 3);
            scene.add(pointLight2);

            // --- Интерактивность ---
            let mouseX = 0;
            let mouseY = 0;
            let targetRotationX = 0;
            let targetRotationY = 0;

            // Для компьютеров (мышь)
            document.addEventListener('mousemove', (event) => {
                mouseX = (event.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            });

            // Для мобильных телефонов (касания пальцем)
            document.addEventListener('touchmove', (event) => {
                if (event.touches.length > 0) {
                    mouseX = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                    mouseY = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
                }
            }, { passive: true });

            setTimeout(() => {
                container.style.opacity = '1';
            }, 100);

            // --- Анимация ---
            const clock = new THREE.Clock();

            function animate3D() {
                requestAnimationFrame(animate3D);
                const time = clock.getElapsedTime();

                // Дыхание
                const baseY = isMobile ? 0 : -1;
                mannequinGroup.position.y = baseY + Math.sin(time * 1.5) * 0.1;

                // Вращение (слежение за мышью/пальцем)
                targetRotationY = mouseX * 0.5; 
                targetRotationX = -mouseY * 0.2;

                mannequinGroup.rotation.y += (targetRotationY - mannequinGroup.rotation.y) * 0.05;
                mannequinGroup.rotation.x += (targetRotationX - mannequinGroup.rotation.x) * 0.05;

                // Вращаем куртку
                jacket.rotation.y = Math.sin(time * 0.5) * 0.05;

                renderer.render(scene, camera);
            }
            animate3D();

            // Пересчет при перевороте телефона
            window.addEventListener('resize', () => {
                const newIsMobile = window.innerWidth < 768;
                camera.position.z = newIsMobile ? 15 : 10;
                mannequinGroup.position.y = newIsMobile ? 0 : -1;
                
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };

        // ==========================================
        // 2. ЭФФЕКТ СНЕГА
        // ==========================================
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Snowflake {
            constructor() {
                this.reset();
                this.y = Math.random() * height; 
            }
            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedY = Math.random() * 0.5 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.6 + 0.2; 
                this.glow = Math.random() * 5 + 2;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > height + 10 || this.x > width || this.x < 0) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.shadowBlur = this.glow;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.9)';
                ctx.fill();
                ctx.closePath();
                ctx.shadowBlur = 0;
            }
        }

        function createSnowflakes() {
            particles = [];
            const particleCount = Math.floor(width / (width > 768 ? 10 : 20)); 
            for (let i = 0; i < particleCount; i++) particles.push(new Snowflake());
        }

        function animateSnow() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateSnow);
        }

        window.addEventListener('resize', () => {
            initCanvas();
            createSnowflakes();
        });

        initCanvas();
        createSnowflakes();
        animateSnow();

        // ==========================================
        // 3. UI
        // ==========================================
        function showToast(message, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        document.getElementById('download-btn').addEventListener('click', () => {
            const btn = document.getElementById('download-btn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = 'Загрузка...';
            btn.style.pointerEvents = 'none';
            
            showToast("Скачивание презентации началось!");

            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.style.pointerEvents = 'auto';
            }, 2000);
        });
    </script>
</body>
</html>
